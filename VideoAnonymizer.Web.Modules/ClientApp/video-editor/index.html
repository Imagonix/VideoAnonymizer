<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Video Editor Dev</title>
</head>
<style>
  :root {    
    --mud-palette-background: #121212;
    --mud-palette-surface: #1e1e1e;
    --mud-palette-surface-variant: #424242;

    --mud-palette-lines-default: rgba(255, 255, 255, 0.12);


    --mud-palette-primary: #594AE2;
    --mud-palette-primary-darken: #4a3fc4;
    --mud-palette-primary-lighten: #7b6cf6;

    --mud-palette-secondary: #FF4081;
    --mud-palette-secondary-darken: #e73370;
    --mud-palette-secondary-lighten: #ff79a8;

    --mud-palette-text-primary: #ffffff;
    --mud-palette-text-secondary: rgba(255,255,255,0.7);
    --mud-palette-text-disabled: '#9e9e9e';
  }

    .mud-elevation-0 {
        box-shadow: none;
    }

    .mud-elevation-1 {
        box-shadow: 0px 2px 1px -1px rgba(0,0,0,0.2), 0px 1px 1px 0px rgba(0,0,0,0.14), 0px 1px 3px 0px rgba(0,0,0,0.12);
    }

    .mud-elevation-2 {
        box-shadow: 0px 3px 1px -2px rgba(0,0,0,0.2), 0px 2px 2px 0px rgba(0,0,0,0.14), 0px 1px 5px 0px rgba(0,0,0,0.12);
    }

    .mud-elevation-3 {
        box-shadow: 0px 3px 3px -2px rgba(0,0,0,0.2), 0px 3px 4px 0px rgba(0,0,0,0.14), 0px 1px 8px 0px rgba(0,0,0,0.12);
    }

    .mud-elevation-4 {
        box-shadow: 0px 2px 4px -1px rgba(0,0,0,0.2), 0px 4px 5px 0px rgba(0,0,0,0.14), 0px 1px 10px 0px rgba(0,0,0,0.12);
    }

    .mud-elevation-5 {
        box-shadow: 0px 3px 5px -1px rgba(0,0,0,0.2), 0px 5px 8px 0px rgba(0,0,0,0.14), 0px 1px 14px 0px rgba(0,0,0,0.12);
    }

    .mud-elevation-6 {
        box-shadow: 0px 3px 5px -1px rgba(0,0,0,0.2), 0px 6px 10px 0px rgba(0,0,0,0.14), 0px 1px 18px 0px rgba(0,0,0,0.12);
    }

    .mud-elevation-8 {
        box-shadow: 0px 5px 5px -3px rgba(0,0,0,0.2), 0px 8px 10px 1px rgba(0,0,0,0.14), 0px 3px 14px 2px rgba(0,0,0,0.12);
    }

    .mud-elevation-12 {
        box-shadow: 0px 7px 8px -4px rgba(0,0,0,0.2), 0px 12px 17px 2px rgba(0,0,0,0.14), 0px 5px 22px 4px rgba(0,0,0,0.12);
    }

    .mud-elevation-16 {
        box-shadow: 0px 8px 10px -5px rgba(0,0,0,0.2), 0px 16px 24px 2px rgba(0,0,0,0.14), 0px 6px 30px 5px rgba(0,0,0,0.12);
    }

    .mud-elevation-24 {
        box-shadow: 0px 11px 15px -7px rgba(0,0,0,0.2), 0px 24px 38px 3px rgba(0,0,0,0.14), 0px 9px 46px 8px rgba(0,0,0,0.12);
    }
</style>
<body>
  <div id="app"></div>
  <script type="module" src="/src/dev-main.ts"></script>
</body>
</html>
